name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── npm 发布 ──────────────────────────────
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Publish to npm
        run: bun publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 跨平台二进制构建 + GitHub Release ───────
  build-binaries:
    runs-on: ubuntu-latest
    needs: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          mkdir -p dist

          bun build ccs.ts --compile --target=bun-darwin-arm64 --outfile dist/ccs-darwin-arm64
          bun build ccs.ts --compile --target=bun-darwin-x64 --outfile dist/ccs-darwin-x64
          bun build ccs.ts --compile --target=bun-linux-x64 --outfile dist/ccs-linux-x64
          bun build ccs.ts --compile --target=bun-linux-arm64 --outfile dist/ccs-linux-arm64
          bun build ccs.ts --compile --target=bun-windows-x64 --outfile dist/ccs-windows-x64.exe

      - name: Create checksums
        run: |
          cd dist
          sha256sum ccs-* > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ccs-darwin-arm64
            dist/ccs-darwin-x64
            dist/ccs-linux-x64
            dist/ccs-linux-arm64
            dist/ccs-windows-x64.exe
            dist/checksums.txt
          generate_release_notes: true
