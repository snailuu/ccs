name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要构建的 tag（如 v1.4.0）"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "${{ steps.tag.outputs.tag }}"

      - name: Build binaries
        run: |
          mkdir -p dist
          app_version="${{ steps.tag.outputs.version }}"

          bun build ccs.ts --compile --target=bun-darwin-arm64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-darwin-arm64
          bun build ccs.ts --compile --target=bun-darwin-x64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-darwin-x64
          bun build ccs.ts --compile --target=bun-linux-x64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-linux-x64
          bun build ccs.ts --compile --target=bun-linux-arm64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-linux-arm64
          bun build ccs.ts --compile --target=bun-windows-x64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-windows-x64.exe

      - name: Generate manifest
        run: |
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > dist/manifest.json <<EOF
          {
            "version": "${{ steps.tag.outputs.tag }}",
            "publishedAt": "${published_at}",
            "files": {
              "darwin-arm64": {
                "url": "https://sh.snailuu.cn/ccs/latest/ccs-darwin-arm64"
              },
              "darwin-x64": {
                "url": "https://sh.snailuu.cn/ccs/latest/ccs-darwin-x64"
              },
              "linux-x64": {
                "url": "https://sh.snailuu.cn/ccs/latest/ccs-linux-x64"
              },
              "linux-arm64": {
                "url": "https://sh.snailuu.cn/ccs/latest/ccs-linux-arm64"
              },
              "windows-x64": {
                "url": "https://sh.snailuu.cn/ccs/latest/ccs-windows-x64.exe"
              }
            }
          }
          EOF

      # ── GitHub Release ───────
      - name: Create checksums
        run: |
          cd dist
          sha256sum ccs-* > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ccs-darwin-arm64
            dist/ccs-darwin-x64
            dist/ccs-linux-x64
            dist/ccs-linux-arm64
            dist/ccs-windows-x64.exe
            dist/checksums.txt
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

      # ── 上传到又拍云 CDN ───────
      - name: Upload to Upyun CDN
        uses: snailuu/upyun-sh-upload@v1
        with:
          service: ccs
          version: ${{ steps.tag.outputs.tag }}
          files: |
            dist/ccs-darwin-arm64
            dist/ccs-darwin-x64
            dist/ccs-linux-x64
            dist/ccs-linux-arm64
            dist/ccs-windows-x64.exe
            dist/manifest.json
            install.sh
          bucket: ${{ secrets.UPYUN_BUCKET }}
          operator: ${{ secrets.UPYUN_OPERATOR }}
          password: ${{ secrets.UPYUN_PASSWORD }}
          cdn_base_url: https://sh.snailuu.cn
          latest: true
          upload_install_sh: true
          generate_checksums: true
          overwrite: true
