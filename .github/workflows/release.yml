name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect release channel
        id: channel
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-beta"* || "$TAG" == *"-alpha"* || "$TAG" == *"-rc"* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        run: |
          mkdir -p dist
          app_version="${GITHUB_REF_NAME#v}"

          bun build ccs.ts --compile --target=bun-darwin-arm64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-darwin-arm64
          bun build ccs.ts --compile --target=bun-darwin-x64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-darwin-x64
          bun build ccs.ts --compile --target=bun-linux-x64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-linux-x64
          bun build ccs.ts --compile --target=bun-linux-arm64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-linux-arm64
          bun build ccs.ts --compile --target=bun-windows-x64 --define "__APP_VERSION__='${app_version}'" --outfile dist/ccs-windows-x64.exe

      - name: Generate manifest
        run: |
          channel="${{ steps.channel.outputs.channel }}"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > dist/manifest.json <<EOF
          {
            "version": "${GITHUB_REF_NAME}",
            "publishedAt": "${published_at}",
            "files": {
              "darwin-arm64": {
                "url": "https://sh.snailuu.cn/ccs/${channel}/ccs-darwin-arm64"
              },
              "darwin-x64": {
                "url": "https://sh.snailuu.cn/ccs/${channel}/ccs-darwin-x64"
              },
              "linux-x64": {
                "url": "https://sh.snailuu.cn/ccs/${channel}/ccs-linux-x64"
              },
              "linux-arm64": {
                "url": "https://sh.snailuu.cn/ccs/${channel}/ccs-linux-arm64"
              },
              "windows-x64": {
                "url": "https://sh.snailuu.cn/ccs/${channel}/ccs-windows-x64.exe"
              }
            }
          }
          EOF

      # ── GitHub Release ───────
      - name: Create checksums
        run: |
          cd dist
          sha256sum ccs-* > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ccs-darwin-arm64
            dist/ccs-darwin-x64
            dist/ccs-linux-x64
            dist/ccs-linux-arm64
            dist/ccs-windows-x64.exe
            dist/checksums.txt
          generate_release_notes: true
          prerelease: ${{ steps.channel.outputs.is_prerelease }}

      # ── 上传到又拍云 CDN ───────
      - name: Upload to Upyun CDN
        uses: snailuu/upyun-sh-upload@v1
        with:
          service: ccs
          version: ${{ github.ref_name }}
          files: |
            dist/ccs-darwin-arm64
            dist/ccs-darwin-x64
            dist/ccs-linux-x64
            dist/ccs-linux-arm64
            dist/ccs-windows-x64.exe
            dist/manifest.json
            install.sh
          bucket: ${{ secrets.UPYUN_BUCKET }}
          operator: ${{ secrets.UPYUN_OPERATOR }}
          password: ${{ secrets.UPYUN_PASSWORD }}
          cdn_base_url: https://sh.snailuu.cn
          latest: ${{ steps.channel.outputs.channel == 'latest' }}
          upload_install_sh: ${{ steps.channel.outputs.channel == 'latest' }}
          generate_checksums: true
          overwrite: true
